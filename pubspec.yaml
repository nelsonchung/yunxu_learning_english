dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  hive_flutter: ^1.1.0
  image_picker: ^1.1.2
  path: ^1.9.0
  path_provider: ^2.1.4
  provider: ^6.1.2
  uuid: ^4.5.1
  google_fonts: ^6.2.1
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  url_launcher: ^6.3.0
  package_info_plus: ^8.3.1
  flutter_tts: ^4.2.5
  flutter_timezone: ^5.0.1
  share_plus: ^12.0.1
  file_selector: ^1.1.0

